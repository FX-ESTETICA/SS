name: zhixuan_main
description: The main entry point for Zhixuan Super App.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 注入核心基础设施模块
  core_network:
    path: ../../packages/core/core_network
  core_design_system:
    path: ../../packages/core/core_design_system
  core_local_db:
    path: ../../packages/core/core_local_db
  core_media:
    path: ../../packages/core/core_media
  feature_video:
    path: ../../packages/features/feature_video
  feature_shop:
    path: ../../packages/features/feature_shop
  feature_im:
    path: ../../packages/features/feature_im
  feature_profile:
    path: ../../packages/features/feature_profile
  
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.7
  window_manager: ^0.5.1
  video_player_win: ^3.2.2
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
