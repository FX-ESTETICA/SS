name: feature_video
description: TikTok-style short video module for Zhixuan Super App
version: 0.0.1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 核心依赖
  core_design_system:
    path: ../../core/core_design_system
  core_network:
    path: ../../core/core_network
  core_media:
    path: ../../core/core_media
    
  # 视频处理相关 UI (依赖必须在当前包也声明，因为直接使用了它们的 Widget)
  image_picker: ^1.1.2
  video_editor: ^3.0.0
  
  # 视频播放器 (官方极速版)
  video_player: ^2.8.2
  video_player_win: ^3.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
